<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultrasound + Clinical Analysis | EndoPredict AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        .prediction-container{
            max-width:1200px;
            margin:40px auto;
            padding:20px;
        }

        .prediction-card{
            background:#ffffff;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .page-title{
            text-align:center;
            color:#166534;
            margin-bottom:10px;
        }

        .page-subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:40px;
        }

        .form-section{
            margin-bottom:35px;
        }

        .form-section h3{
            color:#166534;
            margin-bottom:20px;
            padding-bottom:10px;
            border-bottom:2px solid #dcfce7;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group label{
            font-weight:600;
            color:#374151;
            margin-bottom:8px;
        }

        .form-group input,
        .form-group select{
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:15px;
        }

        .form-group input:focus,
        .form-group select:focus{
            outline:none;
            border-color:#16a34a;
        }

        .upload-box{
            border:2px dashed #16a34a;
            padding:30px;
            border-radius:15px;
            text-align:center;
            background:#f0fdf4;
        }

        .upload-box input{
            margin-top:15px;
        }

        .submit-btn{
            width:100%;
            padding:15px;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#15803d;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            <h2>🩺 EndoPredict AI</h2>
        </div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/numerical">Numerical</a></li>
            <li><a href="/ultrasound" class="active">Ultrasound</a></li>
            <li><a href="/reports">Reports</a></li>
        </ul>

    </nav>

    <div class="prediction-container">

        <div class="prediction-card">

            <h1 class="page-title">
                Endometriosis Multimodal Prediction
            </h1>

            <p class="page-subtitle">
                Upload ultrasound image and clinical parameters
                for AI-powered endometriosis detection.
            </p>

            <form action="/predict_ultrasound"
                  method="POST"
                  enctype="multipart/form-data">

                <!-- Ultrasound Image -->

                <div class="form-section">

                    <h3>Ultrasound Image</h3>

                    <div class="upload-box">

                        <p>
                            Upload Ultrasound Image
                        </p>

                        <input
                            type="file"
                            name="image"
                            accept="image/*"
                            required>

                    </div>

                </div>

                <!-- Clinical Features -->

                <div class="form-section">

                    <h3>Patient Clinical Information</h3>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Age</label>
                            <input type="number"
                                   name="age"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Menstrual Irregularity</label>
                            <select name="menstrual_irregularity" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Chronic Pain Level</label>
                            <input type="number"
                                   name="chronic_pain"
                                   min="0"
                                   max="10"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Hormone Level Abnormality</label>
                            <select name="hormone_abnormality" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Infertility</label>
                            <select name="infertility" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>BMI</label>
                            <input type="number"
                                   step="0.1"
                                   name="bmi"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Height (cm)</label>
                            <input type="number"
                                   step="0.1"
                                   name="height"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <input type="number"
                                   step="0.1"
                                   name="weight"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Blood Pressure Systolic</label>
                            <input type="number"
                                   name="bp_systolic"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Blood Pressure Diastolic</label>
                            <input type="number"
                                   name="bp_diastolic"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Estrogen Level</label>
                            <input type="number"
                                   step="0.01"
                                   name="estrogen"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Progesterone Level</label>
                            <input type="number"
                                   step="0.01"
                                   name="progesterone"
                                   required>
                        </div>

                    </div>

                </div>

                <button type="submit"
                        class="submit-btn">

                    Analyze with EndoPredict AI

                </button>

            </form>

        </div>

    </div>

</body>
</html>
